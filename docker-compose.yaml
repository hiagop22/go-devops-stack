services:
  http-server-projeto-korp:
    build:
      context: ./app
    container_name: http-server-projeto-korp
    networks:
      - korp-network
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
    container_name: nginx
    ports:
      - "80:80"
    networks:
      - korp-network
    restart: unless-stopped

  prometheus:
    build:
      context: ./prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    networks:
      - korp-network
    restart: unless-stopped
    volumes:
      - prometheus_data:/prometheus
  
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.5.1
    container_name: nginx-exporter
    networks:
      - korp-network
    command:
      - '-nginx.scrape-uri=http://nginx:8080/stub_status'
    restart: unless-stopped
    depends_on:
      - nginx
  
  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: node-exporter
    networks:
      - korp-network
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    networks:
      - korp-network
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  grafana:
    build:
      context: ./grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - korp-network
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana/data
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    env_file:
      - .env
    depends_on:
      - prometheus
      - nginx-exporter
      - node-exporter
      - cadvisor

networks:
  korp-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data: