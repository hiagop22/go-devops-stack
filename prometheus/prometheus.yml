global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'korp-project'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['http-server-projeto-korp:8080']
  
  - job_name: 'nginx'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['nginx-exporter:9113']

  - job_name: 'node'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['node-exporter:9100']